<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 300px; margin: 0; padding: 14px; font: 13px/1.5 -apple-system, system-ui, sans-serif; background: #101014; color: #e5e5e5; }
    @media (prefers-color-scheme: light) { body { background: #fafafa; color: #222; } }
    h1 { font-size: 15px; margin: 0 0 10px; background: linear-gradient(135deg,#e8ff47,#ff6b35); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    label { display: block; font-size: 11px; opacity: .7; margin: 8px 0 3px; }
    input { width: 100%; box-sizing: border-box; padding: 7px 9px; border-radius: 8px; border: 1px solid #333; background: transparent; color: inherit; outline: none; }
    button { margin-top: 12px; width: 100%; padding: 8px; border-radius: 8px; border: none; cursor: pointer; background: linear-gradient(135deg,#e8ff47,#ff6b35); font-weight: 600; }
    #msg { font-size: 11px; margin-top: 8px; opacity: .7; }
    .row { margin-top: 10px; display: flex; gap: 8px; }
    .row button { margin-top: 0; background: transparent; border: 1px solid #444; color: inherit; font-weight: 400; }
  </style>
</head>
<body>
  <h1>semaje</h1>
  <label for="apiBase">Server URL</label>
  <input id="apiBase" placeholder="http://localhost:3001" />
  <label for="apiKey">API key (create one at /settings/api-keys — leave empty for single-user)</label>
  <input id="apiKey" type="password" placeholder="smj_…" />
  <button id="save">Save & test</button>
  <div class="row"><button id="panel">Open library panel</button></div>
  <div id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
