<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme:dark; --bg:#0e1212; --surface:#151b1b; --line:#2c3736; --text:#eef4ef; --muted:#9daaa3; --accent:#52c7b8; }
    * { box-sizing:border-box; }
    body { width:320px; margin:0; padding:16px; font:13px/1.5 -apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); }
    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    h1 { margin:0; font-size:18px; letter-spacing:0; }
    header span { color:var(--muted); font:9px ui-monospace,monospace; text-transform:uppercase; }
    label { display:block; margin:10px 0 4px; color:var(--muted); font:10px ui-monospace,monospace; text-transform:uppercase; }
    input { width:100%; padding:8px 9px; border-radius:6px; border:1px solid var(--line); background:var(--surface); color:inherit; outline:none; }
    input:focus { border-color:var(--accent); }
    button { width:100%; margin-top:12px; padding:8px; border-radius:6px; border:1px solid var(--accent); cursor:pointer; background:var(--accent); color:#071210; font-weight:650; }
    #msg { min-height:2.6em; margin-top:9px; color:var(--muted); font-size:11px; }
    .row { display:flex; gap:8px; margin-top:10px; border-top:1px solid var(--line); padding-top:10px; }
    .row button { margin-top:0; border-color:var(--line); background:transparent; color:inherit; font-weight:500; }
  </style>
</head>
<body>
  <header><h1>semaje</h1><span>browser capture</span></header>
  <label for="apiBase">Server URL</label>
  <input id="apiBase" placeholder="http://localhost:3001" />
  <label for="apiKey">API key</label>
  <input id="apiKey" type="password" placeholder="smj_... (optional in single-user mode)" />
  <button id="save">Save and test</button>
  <div class="row"><button id="panel">Open library panel</button></div>
  <div id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
