<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>semaje library</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; padding: 12px; font: 13px/1.5 -apple-system, system-ui, sans-serif;
      background: #101014; color: #e5e5e5;
    }
    @media (prefers-color-scheme: light) { body { background: #fafafa; color: #222; } }
    h1 {
      font-size: 16px; margin: 0 0 10px;
      background: linear-gradient(135deg,#e8ff47,#ff6b35);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #search {
      width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 8px;
      border: 1px solid #333; background: transparent; color: inherit; outline: none;
    }
    .item {
      padding: 10px; margin-top: 8px; border: 1px solid #2c2c34; border-radius: 10px; cursor: pointer;
    }
    .item:hover { border-color: #e8ff47; }
    .title { font-weight: 600; }
    .meta { font-size: 11px; opacity: .6; margin-top: 2px; }
    .preview { font-size: 12px; opacity: .8; margin-top: 4px; max-height: 3em; overflow: hidden; }
    .actions { margin-top: 6px; display: flex; gap: 6px; }
    .actions button {
      font-size: 11px; padding: 3px 8px; border-radius: 6px; cursor: pointer;
      border: 1px solid #444; background: transparent; color: inherit;
    }
    #status { font-size: 12px; opacity: .6; margin-top: 10px; }
    #detail { white-space: pre-wrap; font-size: 12.5px; margin-top: 10px; }
    #back { display: none; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>semaje</h1>
  <button id="back">← back</button>
  <input id="search" placeholder="Search transcripts…" />
  <div id="list"></div>
  <div id="detail"></div>
  <div id="status"></div>
  <script src="panel.js"></script>
</body>
</html>
