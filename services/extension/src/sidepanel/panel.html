<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>semaje library</title>
  <style>
    :root { color-scheme: dark; --bg:#0e1212; --surface:#151b1b; --line:#2c3736; --text:#eef4ef; --muted:#9daaa3; --accent:#52c7b8; --warm:#e28a65; }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; font:13px/1.5 -apple-system,system-ui,sans-serif;
      background:var(--bg); color:var(--text);
    }
    header { position:sticky; top:0; z-index:2; padding:16px 14px 12px; border-bottom:1px solid var(--line); background:rgba(14,18,18,.96); }
    .brand { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    h1 { margin:0; font-size:18px; letter-spacing:0; }
    .live { display:flex; align-items:center; gap:5px; color:var(--muted); font:9px ui-monospace,monospace; text-transform:uppercase; }
    .live::before { content:""; width:6px; height:6px; background:var(--accent); }
    #search {
      width:100%; padding:9px 10px; border-radius:6px; border:1px solid var(--line);
      background:var(--surface); color:inherit; outline:none;
    }
    #search:focus { border-color:var(--accent); }
    main { padding:0 14px 14px; }
    .item {
      position:relative; padding:12px 0; border-bottom:1px solid var(--line); cursor:pointer;
    }
    .item::before { content:""; position:absolute; left:-14px; top:0; bottom:0; width:2px; background:transparent; }
    .item:hover::before { background:var(--accent); }
    .title { font-weight: 600; }
    .meta { margin-top:2px; color:var(--muted); font:10px ui-monospace,monospace; }
    .preview { display:-webkit-box; overflow:hidden; margin-top:6px; color:var(--muted); font-size:12px; -webkit-box-orient:vertical; -webkit-line-clamp:2; }
    .actions { margin-top: 6px; display: flex; gap: 6px; }
    .actions button {
      padding:3px 8px; border-radius:5px; border:1px solid var(--line); cursor:pointer;
      background:transparent; color:var(--muted); font-size:10px;
    }
    .actions button:hover { color:var(--accent); border-color:var(--accent); }
    #status { margin-top:10px; color:var(--warm); font-size:11px; }
    #detail { margin-top:12px; white-space:pre-wrap; font-size:12.5px; }
    #back { display:none; margin:12px 0 0; border:0; padding:0; color:var(--accent); background:transparent; cursor:pointer; }
  </style>
</head>
<body>
  <header><div class="brand"><h1>semaje</h1><span class="live">local library</span></div><input id="search" placeholder="Search conversations" /></header>
  <main><button id="back">Back to results</button><div id="list"></div><div id="detail"></div><div id="status"></div></main>
  <script src="panel.js"></script>
</body>
</html>
