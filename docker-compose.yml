# semaje self-host stack.
# Smallest deploy: AUTH_ADAPTER=single-user, STORAGE_ADAPTER=fs (drop minio),
# LLM_ADAPTER=gemini until `npm run eval:llm` clears claude-local as default.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: semaje
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semaje}
      POSTGRES_DB: semaje
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaje"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-semaje}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-semaje-secret}
    volumes:
      - miniodata:/data
    ports:
      - "9001:9001"
    profiles: ["s3"]   # only starts with `--profile s3` (fs adapter needs no minio)

  whisper:
    build:
      context: .
      dockerfile: services/whisper/Dockerfile
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    volumes:
      - whispermodels:/models

  api:
    build: .
    command: npm run start
    depends_on:
      postgres:
        condition: service_healthy
      whisper:
        condition: service_started
    environment: &appenv
      DATABASE_URL: postgres://semaje:${POSTGRES_PASSWORD:-semaje}@postgres:5432/semaje
      WHISPER_URL: http://whisper:8011
      AUTH_ADAPTER: ${AUTH_ADAPTER:-single-user}
      STORAGE_ADAPTER: ${STORAGE_ADAPTER:-fs}
      STORAGE_FS_DIR: /data/blobs
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: semaje
      S3_ACCESS_KEY: ${MINIO_USER:-semaje}
      S3_SECRET_KEY: ${MINIO_PASSWORD:-semaje-secret}
      LLM_ADAPTER: ${LLM_ADAPTER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SERVE_FRONTEND: "false"
    volumes:
      - blobdata:/data/blobs
      # claude-local adapter: mount your local Claude Code credentials
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude
    ports:
      - "3001:3001"

  worker:
    build: .
    command: npm run worker
    depends_on:
      postgres:
        condition: service_healthy
      whisper:
        condition: service_started
    environment: *appenv
    volumes:
      - blobdata:/data/blobs
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude

  frontend:
    image: nginx:alpine
    depends_on:
      - api
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  pgdata:
  miniodata:
  whispermodels:
  blobdata:
