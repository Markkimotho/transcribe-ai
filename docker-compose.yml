name: semaje

x-app-env: &app-env
  DATABASE_URL: postgres://semaje:${POSTGRES_PASSWORD:-semaje}@postgres:5432/semaje
  WHISPER_URL: http://whisper:8011
  AUTH_ADAPTER: ${AUTH_ADAPTER:-single-user}
  STORAGE_ADAPTER: ${STORAGE_ADAPTER:-fs}
  STORAGE_FS_DIR: /data/blobs
  EXPORTS_DIR: /data/exports
  LOG_DIR: /data/logs
  LLM_ADAPTER: ${LLM_ADAPTER:-ollama}
  OLLAMA_URL: http://ollama:11434
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
  LLM_FALLBACKS: ${LLM_FALLBACKS:-llama-cpp,claude-local}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
  WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me-webhooks}
  STRICT_LOCAL_MODE: ${STRICT_LOCAL_MODE:-true}
  SHARING_ENABLED: ${SHARING_ENABLED:-true}
  SHARE_LOCAL_ONLY: ${SHARE_LOCAL_ONLY:-false}
  TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
  INTEGRATION_FILE_SYNC_DIR: ${INTEGRATION_FILE_SYNC_DIR:-/data/integrations}
  NEXTCLOUD_WEBDAV_URL: ${NEXTCLOUD_WEBDAV_URL:-}
  NEXTCLOUD_USERNAME: ${NEXTCLOUD_USERNAME:-}
  NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD:-}
  SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
  SMTP_URL: ${SMTP_URL:-}
  SMTP_FROM: ${SMTP_FROM:-semaje@localhost}
  SERVE_FRONTEND: "false"

x-app-volumes: &app-volumes
  - blobdata:/data/blobs
  - exports:/data/exports
  - logs:/data/logs
  - integrationdata:/data/integrations

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: semaje
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semaje}
      POSTGRES_DB: semaje
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaje -d semaje"]
      interval: 5s
      timeout: 5s
      retries: 20

  whisper:
    build:
      context: .
      dockerfile: services/whisper/Dockerfile
    restart: unless-stopped
    environment:
      WHISPER_BACKEND: faster-whisper
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      HF_HOME: /models
    volumes:
      - whispermodels:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  ollama:
    image: ollama/ollama:0.9.6
    restart: unless-stopped
    profiles: ["local-llm"]
    volumes:
      - ollamamodels:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 20

  ollama-model:
    image: ollama/ollama:0.9.6
    profiles: ["local-llm"]
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: pull ${OLLAMA_MODEL:-qwen2.5:3b}

  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    profiles: ["llama-cpp"]
    restart: unless-stopped
    command: -m /models/${LLAMA_CPP_MODEL_FILE:-model.gguf} --host 0.0.0.0 --port 8081
    volumes:
      - llamamodels:/models

  migrate:
    build:
      context: .
      target: app
    command: npm run migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *app-env

  api:
    build:
      context: .
      target: app
    command: npm run start
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      whisper:
        condition: service_healthy
    environment: *app-env
    volumes: *app-volumes
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      target: app
    command: npm run worker
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      whisper:
        condition: service_healthy
    environment:
      <<: *app-env
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      WORKER_READY_FILE: /tmp/semaje-worker-ready
    volumes: *app-volumes
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/semaje-worker-ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  watcher:
    build:
      context: .
      target: app
    command: npm run watch
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      WATCH_DIR: /watch
      WATCH_API_BASE: http://api:3001
      WATCH_API_KEY: ${WATCH_API_KEY:-}
      WATCH_WEBHOOK_URL: ${WATCH_WEBHOOK_URL:-}
      WATCH_SCAN_MS: ${WATCH_SCAN_MS:-4000}
      WATCH_SETTLE_MS: ${WATCH_SETTLE_MS:-5000}
    volumes:
      - ${WATCH_DIR:-./data/watch}:/watch

  frontend:
    build:
      context: .
      target: frontend
      args:
        VITE_AUTH_MODE: ${AUTH_ADAPTER:-single-user}
        VITE_API_MODE: proxy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-8080}:80"

volumes:
  pgdata:
  blobdata:
  exports:
  logs:
  whispermodels:
  ollamamodels:
  llamamodels:
  integrationdata:
